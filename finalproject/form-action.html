<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submission Results</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <h1>Submission Results</h1>
</header>

<main>
  <h2>Thank You!</h2>

  <p><strong>Full Name:</strong> <span id="fullname"></span></p>

  <p><strong>Email:</strong> <span id="email"></span></p>

  <p><strong>Favorite Destination:</strong> <span id="destination"></span></p>
</main>

<script>
const params = new URLSearchParams(window.location.search);

document.querySelector("#fullname").textContent =
  params.get("fullname") || "Not provided";

document.querySelector("#email").textContent =
  params.get("email") || "Not provided";

document.querySelector("#destination").textContent =
  params.get("destination") || "Not provided";
</script>

</body>
</html>
